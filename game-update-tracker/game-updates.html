  }
  .header-inner{max-width:1760px; margin:0 auto; display:flex; align-items:center; gap:20px; flex-wrap:wrap;}
  .page-header h1{font-size:20px; font-weight:700;}
  .header-meta{margin-left:auto; display:flex; align-items:center; gap:18px; font-size:12px; color:rgba(255,255,255,.75);}
  .conn .dot{display:inline-block; width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.4); margin-right:6px; vertical-align:middle;}
  .conn .dot.ok{background:#5ad17a;}
  .btn-all{
    padding:8px 20px; border-radius:999px; border:1px solid rgba(255,255,255,.5);
    background:transparent; color:#fff; font-family:inherit; font-size:13px; font-weight:700;
    cursor:pointer; transition:all .15s;
  }
  .btn-all:hover:not(:disabled){background:#fff; color:#003087; border-color:#fff;}
  .btn-all:disabled{opacity:.4; cursor:default;}
  .content{padding:28px 40px 80px; max-width:1760px; margin:0 auto;}
  .banner{display:none; font-size:12.5px; color:var(--spectrum-gray-700,#4b4b4b); background:#fff;
    border:1px solid var(--spectrum-gray-200,#e1e1e1); border-radius:10px; padding:12px 16px; margin-bottom:20px;}
  .banner.show{display:block;}
  .banner code{background:var(--spectrum-gray-100,#f5f5f5); padding:1px 6px; border-radius:4px;}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px;}
  .card{
    background:#fff; border-radius:12px; border:1px solid var(--spectrum-gray-200,#e1e1e1);
    padding:22px 22px 18px; display:flex; flex-direction:column; gap:14px;
    transition:box-shadow .15s, transform .12s;
  }
  .card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08); transform:translateY(-2px);}
  .card.err{border-color:#c0271e;}
  .gname{font-size:19px; font-weight:900; line-height:1.3;}
  .release{display:flex; align-items:baseline; gap:10px;}
  .rlabel{font-size:11px; font-weight:700; color:var(--spectrum-gray-600,#6b6b6b); letter-spacing:.04em;}
  .rdate{font-size:30px; font-weight:900; color:#003087; line-height:1;}
  .datesrc{font-size:12px; color:#0070cc; text-decoration:none; font-weight:600;}
  .datesrc:hover{text-decoration:underline;}
  .datesrc.none{color:var(--spectrum-gray-700,#4b4b4b); font-weight:500;}
  .chars-sec{border-top:1px solid var(--spectrum-gray-200,#e1e1e1); padding-top:12px;}
  .chars-h{font-size:11px; font-weight:700; color:var(--spectrum-gray-600,#6b6b6b); letter-spacing:.06em; margin-bottom:9px;}
  .chars{display:flex; flex-wrap:wrap; gap:12px;}
  .char{display:flex; flex-direction:column; align-items:center; gap:5px; width:56px;}
  .char img{width:52px; height:52px; border-radius:10px; object-fit:cover; background:var(--spectrum-gray-100,#f5f5f5); border:1px solid var(--spectrum-gray-200,#e1e1e1);}
  .char .ph{width:52px; height:52px; border-radius:10px; background:var(--spectrum-gray-100,#f5f5f5); border:1px solid var(--spectrum-gray-200,#e1e1e1); display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:900; color:var(--spectrum-gray-500,#909090);}
  .char .cn{font-size:11px; text-align:center; line-height:1.25; word-break:break-all;}
  .empty{font-size:12.5px; color:var(--spectrum-gray-500,#909090);}
  .src{margin-top:auto; font-size:12.5px; color:#0070cc; text-decoration:none; font-weight:600;}
  .src:hover{text-decoration:underline;}
  .errmsg{font-size:11.5px; color:#c0271e;}
  .tier{border-top:1px solid var(--spectrum-gray-200,#e1e1e1); margin-top:2px;}
  .tier-toggle{width:100%; text-align:left; border:none; background:none; padding:10px 0 2px; font-size:12.5px; font-weight:700; color:#0070cc; cursor:pointer; font-family:inherit;}
  .tier-toggle:hover{text-decoration:underline;}
  .tier-body{display:flex; flex-direction:column; gap:6px; padding:6px 0 2px;}
  .tier-row{display:flex; gap:8px; align-items:baseline;}
  .tier-rank{flex-shrink:0; min-width:32px; text-align:center; font-size:11px; font-weight:800; color:#fff; background:var(--spectrum-gray-700,#4b4b4b); border-radius:4px; padding:2px 4px;}
  .tier-rank.ss{background:#c0271e;}
  .tier-names{font-size:11.5px; color:var(--spectrum-gray-800,#2c2c2c); line-height:1.55;}
  .tier-names .hot{color:#c0271e; font-weight:700;}
  .leak{margin-top:2px;}
  .leak .chars-h{color:#c0271e;}
  a.rdate.lk{text-decoration:none; cursor:pointer;}
  a.rdate.lk:hover{text-decoration:underline;}
  .char a.cn{color:#0070cc; text-decoration:none;}
  .char a.cn:hover{text-decoration:underline;}
</style>
</head>

const SERVER = "http://localhost:8765";
const grid = document.getElementById('grid');
const banner = document.getElementById('banner');
let serverOnline = false;

const fmtTime = iso => {
  if(!iso) return '—';
  const d = new Date(iso); const p = n => String(n).padStart(2,'0');
  return `${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
};
const esc = s => (s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function charHTML(c, href){
  const img = c.img
    ? `<img src="${esc(c.img)}" alt="${esc(c.name)}" loading="lazy">`
    : `<div class="ph">${esc((c.name||'?').slice(0,1))}</div>`;
  const cn = href
    ? `<a class="cn lk" href="${esc(href)}" rel="noopener">${esc(c.name)}</a>`
    : `<div class="cn">${esc(c.name)}</div>`;
  return `<div class="char">${img}${cn}</div>`;
}
function cardHTML(g){
  const charsBlock = (list, href) => (list && list.length)
    ? `<div class="chars">${list.map(c => charHTML(c, href)).join('')}</div>`
    : `<div class="empty">—</div>`;
  const rdate = g.date_url
    ? `<a class="rdate lk" href="${esc(g.date_url)}" rel="noopener">${esc(g.release_date||'未定')}</a>`
    : `<span class="rdate">${esc(g.release_date||'未定')}</span>`;
  const hot = g.banner_chars || [];
  const isHot = n => hot.some(b => b && (n === b || n.includes(b) || b.includes(n)));
  const nm = n => isHot(n) ? `<span class="hot">${esc(n)}</span>` : esc(n);
  const tier = (g.tier && g.tier.length)
    ? `<div class="tier"><button class="tier-toggle" type="button" data-src="${esc(g.tier_url||'')}">最強キャラランキング ▼</button>`
      + `<div class="tier-body" hidden>`
      + g.tier.map(t => `<div class="tier-row"><span class="tier-rank ${t.rank==='SS'?'ss':''}">${esc(t.rank)}</span><span class="tier-names">${t.chars.map(nm).join('、')}</span></div>`).join('')
      + `</div></div>`
    : '';
  const newSec = `<div class="chars-sec"><div class="chars-h">ガチャ</div>${charsBlock(g.new_characters)}</div>`;
  const leakSec = `<div class="chars-sec leak"><div class="chars-h">リーク（新キャラ）</div>${charsBlock(g.leak_characters, g.leak_url)}</div>`;
  const err = g.error ? `<div class="errmsg">取得エラー: ${esc(g.error)}</div>` : '';
  return `
  <div class="card${g.error?' err':''}" data-id="${g.id}">
    <div class="gname">${esc(g.short||g.name)}</div>
    <div class="release"><span class="rlabel">次回配信予定</span>${rdate}</div>
    ${newSec}
    ${tier}
    ${leakSec}
    ${err}
  </div>`;
}
function render(data){
  grid.innerHTML = data.games.map(cardHTML).join('');
  document.getElementById('updatedAt').textContent = '最終更新: ' + fmtTime(data.updated_at);
}
function setConn(){
  document.getElementById('conn').innerHTML = `<span class="dot ${serverOnline?'ok':''}"></span>${serverOnline?'サーバ接続中':'オフライン表示'}`;
  document.getElementById('refreshAll').disabled = !serverOnline;
  if(serverOnline){ banner.classList.remove('show'); }
  else{
    banner.classList.add('show');
    banner.innerHTML = '現在は埋め込み済みデータを表示中。最新を取得するには <code>start.command</code> でサーバを起動し、<code>http://localhost:8765/</code> を開いてください。';
  }
}
async function probe(){
  try{
    const r = await fetch(SERVER + '/api/games', {cache:'no-store'});
    if(r.ok){ serverOnline = true; setConn(); render(await r.json()); return; }
  }catch(e){}
  serverOnline = false; setConn(); render(INITIAL_DATA);
}
async function refreshAll(){
  if(!serverOnline) return;
  const btn = document.getElementById('refreshAll');
  btn.disabled = true; btn.textContent = '全件取得中…'; grid.style.opacity = .5;
  try{
    const data = await (await fetch(SERVER + '/api/refresh-all', {method:'POST'})).json();
    render(data);
  }catch(e){ serverOnline = false; setConn(); }
  grid.style.opacity = 1; btn.textContent = 'すべて更新'; btn.disabled = false;
}
document.getElementById('refreshAll').addEventListener('click', refreshAll);
function openWin(url){
  if(!url) return;
  const w = 412, h = 915;
  // 画面右側に表示。名前付きウィンドウ "gw_popup" を使い回す（中身が差し替わる）。
  const feat = `popup=yes,width=${w},height=${h},left=${Math.max(0,screen.width-w-40)},top=80,scrollbars=yes,resizable=yes`;
  window.open(url, 'gw_popup', feat);
}
grid.addEventListener('click', e => {
  // すべてのリンク（次回配信予定・リーク）は別ウィンドウで開く仕様に統一。
  const a = e.target.closest('a.lk');
  if(a){ e.preventDefault(); openWin(a.getAttribute('href')); return; }
  const b = e.target.closest('.tier-toggle');
  if(!b) return;
  const body = b.nextElementSibling;
  if(body.hasAttribute('hidden')){
    body.removeAttribute('hidden'); b.textContent = '最強キャラランキング ▲';
    openWin(b.dataset.src);
  } else {
    body.setAttribute('hidden',''); b.textContent = '最強キャラランキング ▼';
  }
});
probe();
</script>
